name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write  # required to create releases + upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # so git describe / tag picks up properly

      - uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum

      - name: Build all platforms
        run: bash build/build.sh termulaa "${GITHUB_REF_NAME#v}"

      - name: Rename release assets
        run: |
          tag="${GITHUB_REF_NAME}"
          mkdir -p release
          for os in linux darwin; do
            for arch in amd64 arm64; do
              src="dist/$os/termulaa-$arch-$tag"
              dst="release/termulaa-$os-$arch-$tag"
              cp "$src" "$dst"
            done
          done
          ls -la release/

      - name: Create release and upload binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            release/*
