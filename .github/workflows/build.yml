name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum

      - name: gofmt
        working-directory: src
        run: |
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "gofmt needed on:"
            echo "$diff"
            exit 1
          fi

      - name: go vet
        working-directory: src
        run: go vet ./...

      - name: go build
        run: bash build/build.sh

      - name: list artifacts
        run: ls -la dist/*/ || true
